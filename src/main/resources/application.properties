spring.application.name=calorias

# Perfil padrao: local (H2 em memoria) para testar no Insomnia sem Oracle.
# Oracle FIAP: SPRING_PROFILES_ACTIVE=oracle e senha via SPRING_DATASOURCE_PASSWORD
# ou application-oracle-local.properties (veja application-oracle-local.properties.example).
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
