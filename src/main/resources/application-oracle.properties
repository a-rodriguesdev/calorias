# Banco Oracle (FIAP). Senha fora do repositório.
#
# Informe a senha por UM destes meios:
#   - Variável de ambiente: SPRING_DATASOURCE_PASSWORD (Spring Boot reconhece automaticamente)
#   - Arquivo na raiz do projeto (gitignore): copie application-oracle-local.properties.example
#     para application-oracle-local.properties e preencha spring.datasource.password
spring.config.import=optional:file:./application-oracle-local.properties

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:oracle:thin:@oracle.fiap.com.br:1521:ORCL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:RM565919}

spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=validate

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
